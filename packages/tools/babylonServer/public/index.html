<!doctype html>
<html lang="en">

<head>
    <title>BabylonServer</title>
    <meta charset="utf-8" />
    <meta
        name="viewport"
        content="width=device-width, user-scalable=no"
    />

    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }

        #wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
        }

        #inspector {
            width: 25%;
        }

    </style>
</head>

<body>
    <div id="wrapper">
        <canvas id="babylon-canvas"></canvas>
        <!-- <div id="inspector"></div> -->
    </div>
    <script src="babylon.js"></script>
    <script>
        const canvas = document.getElementById("babylon-canvas");
        const engine = new BABYLON.Engine(canvas, true);
        const scene = new BABYLON.Scene(engine);
        const camera = new BABYLON.ArcRotateCamera(
            "camera",
            -0.5 * Math.PI,
            0.5 * Math.PI,
            2,
            BABYLON.Vector3.Zero(),
            scene
        );
        camera.attachControl(canvas, true);
        const light = new BABYLON.HemisphericLight(
            "light",
            new BABYLON.Vector3(1, 1, 0),
            scene
        );
        const plane = BABYLON.MeshBuilder.CreatePlane(
            "plane",
            { size: 1 },
            scene
        );

        let texture
        if (!"FLOAT") {
            const data_float = new Float32Array(4 * 8)
            for (let i = 0; i < data_float.length; i++) {
                data_float[i] = i / (data_float.length - 1)
            }
            texture = new BABYLON.RawTexture(
                data_float,
                8,
                4,
                BABYLON.Engine.TEXTUREFORMAT_RED,
                scene,
                false,
                false,
                BABYLON.Texture.LINEAR,
                BABYLON.Engine.TEXTURETYPE_FLOAT
            )
        } else {
            const data_short = new Int16Array(4 * 8)
            for (let i = 0; i < data_short.length; i++) {
                data_short[i] = i * 32000 / (data_short.length - 1)
            }
            console.log(BABYLON.Engine.TEXTUREFORMAT_R16_EXT)
            texture = new BABYLON.RawTexture(
                data_short,
                8,
                4,
                BABYLON.Engine.TEXTUREFORMAT_R16_SNORM,
                scene,
                false,
                false,
                BABYLON.Texture.LINEAR,
                BABYLON.Engine.TEXTURETYPE_SHORT
            )
        }

        const mat = new BABYLON.StandardMaterial("mat", scene)
        mat.emissiveTexture = texture
        plane.material = mat

        let dirty = 10

        function render() {
            camera.update()
            if (dirty > 0) {
                scene.render(false)
                dirty--
            }
        }

        engine.runRenderLoop(render)
        camera.onViewMatrixChangedObservable.add(() => {
            dirty = Math.min(10, dirty + 1)
        })

        window.addEventListener("resize", function () {
            engine.resize()
            dirty = 10
        });
    </script>
